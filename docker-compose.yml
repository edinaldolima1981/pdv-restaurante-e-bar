version: '3.8'

services:
  # PostgreSQL - porta isolada 5434
  db:
    image: postgres:16-alpine
    container_name: pdv-restaurante-db
    environment:
      POSTGRES_USER: pdvrestaurante
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pdvrestaurante123}
      POSTGRES_DB: pdv_restaurante
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5434:5432"
    volumes:
      - pdv_restaurante_db:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - pdv_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pdvrestaurante"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API - Node.js/Express - porta 3004
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pdv-restaurante-backend
    environment:
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: pdvrestaurante
      DB_PASSWORD: ${DB_PASSWORD:-pdvrestaurante123}
      DB_NAME: pdv_restaurante
      PORT: 3004
      JWT_SECRET: ${JWT_SECRET:-seu-secret-jwt-super-seguro-aqui}
    ports:
      - "3004:3004"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - pdv_network
    restart: unless-stopped

  # Frontend - React/Vite - porta 8082
  frontend:
    build:
      context: ./
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3004
    container_name: pdv-restaurante-frontend
    environment:
      VITE_API_URL: http://localhost:3004
    ports:
      - "8082:5173"
    depends_on:
      - backend
    volumes:
      - ./src:/app/src
      - ./public:/app/public
    networks:
      - pdv_network
    restart: unless-stopped

volumes:
  pdv_restaurante_db:

networks:
  pdv_network:
    driver: bridge
