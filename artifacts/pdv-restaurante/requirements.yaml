packages:
  "framer-motion": "For fluid page transitions, modal animations, and micro-interactions"
  "react-hook-form": "For robust form state management and validation"
  "@hookform/resolvers": "Zod integration for react-hook-form"
  "date-fns": "For formatting dates in order history and cash sessions"
  "recharts": "For beautiful analytics charts in the reports section"
  "clsx": "For conditional tailwind class merging"
  "tailwind-merge": "For conditional tailwind class merging"

images:
  - path: "artifacts/pdv-restaurante/public/images/login-bg.png"
    description: "Dark, moody, high-end restaurant interior background, blurred, with warm amber lighting accents, cinematic, professional"
    aspect_ratio: "16:9"
  - path: "artifacts/pdv-restaurante/public/images/logo-icon.png"
    description: "Minimalist, sleek line-art logo of a cloche or chef hat intersecting with a pos terminal, glowing amber color on dark transparent background"
    aspect_ratio: "1:1"

notes:
  - App uses Dark Mode by default for a sleek restaurant POS vibe.
  - Using generated API hooks from @workspace/api-client-react.
  - Auth token is stored in localStorage as pdv_token.
